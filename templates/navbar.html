<div class="fixedTop">
  <!-- Top bar-->
  <div class="d-none d-lg-block">
    <div class="top-bar">
      <div class="container d-flex justify-content-end align-items-center">
        <ul class="list-styled mb-0" id="contact-info">
          <li>
            <a href="#" class="text-align-center fw-bold" id="phone-number">
              <i class='bx bx-phone-call'></i> {{ phone }}
            </a>
          </li>
          <li class="text-dark">|</li>
          <li>
            <a href="#" class="text-align-center fw-bold">
              <i class='bx bxs-envelope mx-1'></i> lbcertifications@gmail.com
            </a>
          </li>
          <li class="text-dark">|</li>
          <li>
            <a href="#" class="text-align-center fw-bold">
              <i class='bx bx-search-alt'></i> Verify Certificate
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">
        <img src="static/images/logo.png" alt="Bootstrap" class="logo">
      </a>
      <button class="navbar-toggler togglerButton" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" 
              aria-label="Toggle navigation">
        <img src="static/images/icons8-menu.gif" alt="Menu Icon" style="height: 24px;">
      </button>

      <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
        <ul class="navbar-nav d-flex gap-2">
          <li class="nav-item"><a class="nav-link navItem active" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about-us">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/training-courses">Training Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="/collection">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="/collection">Careers</a></li>
          <li class="nav-item"><a class="nav-link" href="/collection">News & Blogs</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
      </div>

      <!-- Country Dropdown -->
      <div class="dropdown">
        <button class="btn btn-secondary countryButton dropdown-toggle fw-bold border-1" type="button" 
                data-bs-toggle="dropdown" aria-expanded="false" id="selected-country">
          Canada
        </button>
        <ul class="dropdown-menu custom-dropdown-menu border-1">
          <li><a class="dropdown-item fw-bold" href="#" onclick="selectCountry('Canada')">Canada</a></li>
          <li><a class="dropdown-item fw-bold" href="#" onclick="selectCountry('UK')">UK</a></li>
          <li><a class="dropdown-item fw-bold" href="#" onclick="selectCountry('Qatar')">Qatar</a></li>
          <li><a class="dropdown-item fw-bold" href="#" onclick="selectCountry('India')">India</a></li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<!-- JavaScript -->
<script>
  function selectCountry(country) {
    fetch('/update_contact', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ country: country })
    })
    .then(response => response.json())
    .then(data => {
      // Update the phone number and country display
      document.getElementById('phone-number').innerHTML = 
        `<i class='bx bx-phone-call'></i> ${data.phone}`;
      document.getElementById('selected-country').textContent = data.country;
    })
    .catch(error => console.error('Error:', error));
  }
</script>
